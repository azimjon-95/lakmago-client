<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LokmaGo — Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(1200px 800px at 50% -10%, #1c1c22 0%, #0b0b0d 60%);
      color: #f2f1ee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 22px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand .logo {
      width: 38px; height: 38px; border-radius: 11px;
      background: #ef9f27; display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .brand span { color: #9a9a96; font-size: 13px; display: block; font-weight: 400; }

    /* Telefon korpusi */
    .phone {
      position: relative;
      width: 390px;
      height: 810px;
      max-height: 88vh;
      background: #0e0e10;
      border-radius: 46px;
      padding: 12px;
      box-shadow:
        0 0 0 12px #17171b,
        0 0 0 13px #26262c,
        0 40px 80px -20px rgba(0,0,0,0.7);
    }
    /* Notch (dinamik orol) */
    .phone::before {
      content: '';
      position: absolute;
      top: 22px; left: 50%; transform: translateX(-50%);
      width: 118px; height: 32px;
      background: #0e0e10;
      border-radius: 20px;
      z-index: 5;
    }
    .screen {
      width: 100%; height: 100%;
      border-radius: 36px;
      overflow: hidden;
      background: #0e0e10;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0;
      display: block;
    }
    /* Yon tugmalar */
    .btn-side {
      position: absolute; width: 3px; border-radius: 3px;
      background: #26262c;
    }
    .btn-power { right: -3px; top: 200px; height: 84px; }
    .btn-vol1 { left: -3px; top: 168px; height: 46px; }
    .btn-vol2 { left: -3px; top: 226px; height: 46px; }

    .hint {
      color: #6c6c68; font-size: 13px; text-align: center; max-width: 360px;
      line-height: 1.5;
    }
    .hint b { color: #ef9f27; font-weight: 500; }
    .controls { display: flex; gap: 10px; }
    .controls button {
      background: #1a1a1e; color: #d9d9d4; border: 1px solid #2a2a30;
      padding: 9px 16px; border-radius: 10px; font-size: 13px; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .controls button:hover { border-color: #ef9f27; color: #ef9f27; }

    @media (max-width: 480px) {
      /* Telefonда ochilsa — ramkasiz, to'liq ekran */
      body { padding: 0; }
      .brand, .hint, .controls { display: none; }
      .phone {
        width: 100vw; height: 100vh; max-height: none;
        border-radius: 0; padding: 0; box-shadow: none;
      }
      .phone::before { display: none; }
      .screen { border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="logo">🍽️</div>
    <div>
      <h1>LokmaGo</h1>
      <span>Telegram Mini App — demo ko'rinishi</span>
    </div>
  </div>

  <div class="phone">
    <div class="btn-side btn-power"></div>
    <div class="btn-side btn-vol1"></div>
    <div class="btn-side btn-vol2"></div>
    <div class="screen">
      <iframe id="app" src="/" title="LokmaGo webapp"></iframe>
    </div>
  </div>

  <div class="controls">
    <button onclick="document.getElementById('app').src='/'">🏠 Bosh sahifa</button>
    <button onclick="document.getElementById('app').contentWindow.location.reload()">↻ Yangilash</button>
  </div>

  <p class="hint">
    Bu <b>demo</b> ko'rinishi. Haqiqiy foydalanuvchilar ilovani Telegram orqali ochadi.
    Ichida to'liq mock ma'lumot bilan ishlaydi — restoran tanlang, savatga qo'shing va buyurtma bering.
  </p>
</body>
</html>
